<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#007AFF"/>

  <!-- Simplified document icon -->
  <g transform="translate(12, 10)">
    <!-- Main document -->
    <rect x="0" y="0" width="24" height="28" rx="2" fill="white"/>

    <!-- Header -->
    <rect x="3" y="4" width="18" height="2" rx="1" fill="#007AFF" opacity="0.4"/>
    <rect x="3" y="8" width="12" height="1.5" rx="0.75" fill="#007AFF" opacity="0.3"/>

    <!-- Content lines -->
    <rect x="3" y="13" width="18" height="1" rx="0.5" fill="#E5E5E5"/>
    <rect x="3" y="16" width="18" height="1" rx="0.5" fill="#E5E5E5"/>
    <rect x="3" y="19" width="14" height="1" rx="0.5" fill="#E5E5E5"/>

    <!-- X Mark -->
    <g transform="translate(18, 22)">
      <rect x="0" y="0" width="4" height="4" rx="0.8" fill="#007AFF"/>
      <path d="M 1 1 L 3 3 M 3 1 L 1 3" stroke="white" stroke-width="0.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>